# ============================================================
# Surge 多节点模板：适合 2 个、5 个、10 个甚至更多节点
# ============================================================
#
# A. 规则仓库地址
#    默认调用本仓库：
#      https://raw.githubusercontent.com/bleeeet/surge-rules/main
#
#    朋友直接使用时，这里不用改。
#    如果你 fork 了这个仓库，再把全文里的 bleeeet/surge-rules/main
#    替换成自己的 GitHub 用户名、仓库名和分支名。
#
# B. 添加节点的方法
#    在 [Proxy] 里复制一行 Node 示例，改成自己的节点信息。
#
#    节点名可以自己取，例如：
#      US-1
#      US-2
#      HK-1
#      JP-1
#      SG-1
#
#    每增加一个节点，都要把节点名加到 [Proxy Group] 的这两行里：
#      🔰 节点选择 = select, ...
#      ♻️ 自动选择 = url-test, ...
#
# C. 普通 Snell 节点需要填写
#    YOUR_SERVER_IP_OR_DOMAIN  -> 服务器 IP 或域名
#    YOUR_SNELL_PORT           -> Snell 端口
#    YOUR_SNELL_PSK            -> Snell PSK 密钥
#
# D. 可选 ShadowTLS 节点
#    没有 ShadowTLS 就不要取消注释。
#    有 ShadowTLS 时，复制 Node-STLS 示例，填端口和密码，
#    并把这个 STLS 节点名也加入两个主策略组。
#
# E. 可选 Surge 控制器密码
#    不需要远程控制 Surge 的话，可以保持 http-api-web-dashboard = false。
#    如果要用，把 CHANGE_ME_CONTROLLER_PASSWORD 改成强密码。
#
# 注意：不要把填好真实节点密钥的版本上传到公开仓库。
# ============================================================

[General]
# General：Surge 通用设置
loglevel = notify
# loglevel：日志等级，notify 表示日常只显示必要通知
ipv6 = false
# ipv6：是否启用 IPv6
dns-server = 223.5.5.5, 119.29.29.29, 1.1.1.1, 8.8.8.8, system
# dns-server：DNS 服务器
skip-proxy = localhost, *.local, 0.0.0.0/8, 10.0.0.0/8, 17.0.0.0/8, 100.64.0.0/10, 127.0.0.0/8, 169.254.0.0/16, 192.168.0.0/16
# skip-proxy：这些本地地址不走 Surge 代理
exclude-simple-hostnames = true
show-error-page-for-reject = true
internet-test-url = http://connect.rom.miui.com/generate_204
proxy-test-url = http://www.gstatic.com/generate_204
test-timeout = 5
encrypted-dns-follow-outbound-mode = true
encrypted-dns-server = https://223.6.6.6/dns-query
geoip-maxmind-url = https://github.com/Hackl0us/GeoIP2-CN/raw/release/Country.mmdb
external-controller-access = CHANGE_ME_CONTROLLER_PASSWORD@0.0.0.0:6166
http-api-web-dashboard = false
allow-wifi-access = false
wifi-access-http-port = 6152
wifi-access-socks5-port = 6153

[Proxy]
# Proxy：节点配置区
# 下面放了 5 个普通 Snell 节点示例。用几个就保留几个，不够就继续复制。
# 节点名左侧不能重复；右侧依次是：协议、服务器、端口、PSK、协议版本和连接参数。

US-1 = snell, US_1_SERVER_IP_OR_DOMAIN, US_1_SNELL_PORT, psk=US_1_SNELL_PSK, version=5, reuse=true, tfo=true
US-2 = snell, US_2_SERVER_IP_OR_DOMAIN, US_2_SNELL_PORT, psk=US_2_SNELL_PSK, version=5, reuse=true, tfo=true
HK-1 = snell, HK_1_SERVER_IP_OR_DOMAIN, HK_1_SNELL_PORT, psk=HK_1_SNELL_PSK, version=5, reuse=true, tfo=true
JP-1 = snell, JP_1_SERVER_IP_OR_DOMAIN, JP_1_SNELL_PORT, psk=JP_1_SNELL_PSK, version=5, reuse=true, tfo=true
SG-1 = snell, SG_1_SERVER_IP_OR_DOMAIN, SG_1_SNELL_PORT, psk=SG_1_SNELL_PSK, version=5, reuse=true, tfo=true

# 可选：ShadowTLS 节点示例。没有 ShadowTLS 就保持注释。
# US-1-STLS = snell, US_1_SERVER_IP_OR_DOMAIN, US_1_SHADOWTLS_PORT, psk=US_1_SNELL_PSK, version=5, reuse=true, tfo=true, shadow-tls-password=US_1_SHADOWTLS_PASSWORD, shadow-tls-sni=www.microsoft.com, shadow-tls-version=3
# HK-1-STLS = snell, HK_1_SERVER_IP_OR_DOMAIN, HK_1_SHADOWTLS_PORT, psk=HK_1_SNELL_PSK, version=5, reuse=true, tfo=true, shadow-tls-password=HK_1_SHADOWTLS_PASSWORD, shadow-tls-sni=www.microsoft.com, shadow-tls-version=3

[Proxy Group]
# Proxy Group：策略组配置区，可以在 Surge 里手动切换某类服务走哪个节点
# select：手动选择策略
# url-test：自动测速选择最快节点；interval=300 表示每 300 秒测速一次
# no-alert=0：切换策略时允许提示
# hidden=0：在 Surge 界面里显示这个策略组
# include-all-proxies=0：不自动包含全部节点，只使用本行明确写出的策略

# 主策略组：新增节点后，把节点名也加到这两行里。
🔰 节点选择 = select, "♻️ 自动选择", US-1, US-2, HK-1, JP-1, SG-1, "🎯 全球直连", "⛔️ 禁止访问"
♻️ 自动选择 = url-test, US-1, US-2, HK-1, JP-1, SG-1, url=http://www.gstatic.com/generate_204, interval=300

# 如果启用了 ShadowTLS 节点，可以把 STLS 节点名也加进去，例如：
# 🔰 节点选择 = select, "♻️ 自动选择", US-1, US-1-STLS, US-2, HK-1, HK-1-STLS, JP-1, SG-1, "🎯 全球直连", "⛔️ 禁止访问"
# ♻️ 自动选择 = url-test, US-1, US-1-STLS, US-2, HK-1, HK-1-STLS, JP-1, SG-1, url=http://www.gstatic.com/generate_204, interval=300

# 常用专用分组：默认跟随主策略，也可以在 Surge 里为每类服务单独指定节点。
ChatGPT = select, "🔰 节点选择", "♻️ 自动选择", US-1, US-2, HK-1, JP-1, SG-1, no-alert=0, hidden=0, include-all-proxies=0
Claude = select, "🔰 节点选择", "♻️ 自动选择", US-1, US-2, HK-1, JP-1, SG-1, no-alert=0, hidden=0, include-all-proxies=0
Gemini = select, "🔰 节点选择", "♻️ 自动选择", US-1, US-2, HK-1, JP-1, SG-1, no-alert=0, hidden=0, include-all-proxies=0
GitHub = select, "🔰 节点选择", "♻️ 自动选择", US-1, US-2, HK-1, JP-1, SG-1, no-alert=0, hidden=0, include-all-proxies=0
Microsoft = select, "🔰 节点选择", "♻️ 自动选择", DIRECT, US-1, US-2, HK-1, JP-1, SG-1, no-alert=0, hidden=0, include-all-proxies=0
Telegram = select, "🔰 节点选择", "♻️ 自动选择", US-1, US-2, HK-1, JP-1, SG-1, no-alert=0, hidden=0, include-all-proxies=0
Apple = select, DIRECT, "🔰 节点选择", "♻️ 自动选择", US-1, US-2, HK-1, JP-1, SG-1, no-alert=0, hidden=0, include-all-proxies=0
YouTube = select, "🔰 节点选择", "♻️ 自动选择", US-1, US-2, HK-1, JP-1, SG-1, no-alert=0, hidden=0, include-all-proxies=0
Netflix = select, "🔰 节点选择", "♻️ 自动选择", US-1, US-2, HK-1, JP-1, SG-1, no-alert=0, hidden=0, include-all-proxies=0
Spotify = select, "🔰 节点选择", "♻️ 自动选择", US-1, US-2, HK-1, JP-1, SG-1, no-alert=0, hidden=0, include-all-proxies=0
AI = select, "🔰 节点选择", "♻️ 自动选择", US-1, US-2, HK-1, JP-1, SG-1, no-alert=0, hidden=0, include-all-proxies=0
🎯 全球直连 = select, DIRECT
⛔️ 禁止访问 = select, REJECT

[Rule]
# Rule：规则区，Surge 会从上往下匹配，先匹配到哪条就按哪条执行
# RULE-SET：引用一个远程或本地规则文件
# update-interval=86400：每 86400 秒，也就是每天更新一次规则
