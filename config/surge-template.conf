# ============================================================
# Surge 模板：只需要先填下面这些占位符
# ============================================================
#
# A. 规则仓库地址
#    默认调用本仓库：
#      https://raw.githubusercontent.com/bleeeet/surge-rules/main
#
#    朋友直接使用时，这里不用改。
#    如果你 fork 了这个仓库，再把全文里的 bleeeet/surge-rules/main
#    替换成自己的 GitHub 用户名、仓库名和分支名。
#
#    YOUR_GITHUB_NAME -> GitHub 用户名或组织名
#    YOUR_REPO        -> GitHub 仓库名
#    main             -> GitHub 分支名，一般不用改
#
# B. 必填节点信息，也就是 [Proxy] 里的 Node-1
#    Node-1                    -> 节点名称，可以改成自己喜欢的名字
#    snell                     -> 代理协议，这里默认是 Snell
#    YOUR_SERVER_IP_OR_DOMAIN  -> 服务器 IP 或域名
#    YOUR_SNELL_PORT           -> Snell 端口
#    YOUR_SNELL_PSK            -> Snell PSK 密钥
#    psk                       -> Snell 的密码字段
#    version=5                 -> Snell 协议版本
#    reuse=true                -> 复用连接
#    tfo=true                  -> TCP Fast Open
#
# C. 可选 ShadowTLS 节点
#    ShadowTLS                 -> 伪装 TLS 流量的一层转发
#    YOUR_SHADOWTLS_PORT       -> ShadowTLS 端口
#    YOUR_SHADOWTLS_PASSWORD   -> ShadowTLS 密码
#    shadow-tls-sni            -> 伪装的 TLS 域名，通常保持默认即可
#    默认已经注释掉，不填也不影响使用。
#    如果你有 ShadowTLS，把 [Proxy] 里的 Node-1-STLS 那一行取消注释，
#    再把 [Proxy Group] 里带 Node-1-STLS 的两行打开，并注释掉只含 Node-1 的两行。
#
# D. 可选 Surge 控制器密码
#    不需要远程控制 Surge 的话，可以保持 http-api-web-dashboard = false。
#    如果要用，把 CHANGE_ME_CONTROLLER_PASSWORD 改成强密码。
#
# 注意：不要把填好真实节点密钥的版本上传到公开仓库。
# ============================================================

[General]
# General：Surge 通用设置
loglevel = notify
# loglevel：日志等级，notify 表示日常只显示必要通知
ipv6 = false
# ipv6：是否启用 IPv6
dns-server = 223.5.5.5, 119.29.29.29, 1.1.1.1, 8.8.8.8, system
# dns-server：DNS 服务器
skip-proxy = localhost, *.local, 0.0.0.0/8, 10.0.0.0/8, 17.0.0.0/8, 100.64.0.0/10, 127.0.0.0/8, 169.254.0.0/16, 192.168.0.0/16
# skip-proxy：这些本地地址不走 Surge 代理
exclude-simple-hostnames = true
# exclude-simple-hostnames：简单主机名不走代理
show-error-page-for-reject = true
# show-error-page-for-reject：被拒绝访问时显示错误页
internet-test-url = http://connect.rom.miui.com/generate_204
# internet-test-url：网络连通性测试地址
proxy-test-url = http://www.gstatic.com/generate_204
# proxy-test-url：节点测速地址
test-timeout = 5
# test-timeout：测速超时时间，单位秒
encrypted-dns-follow-outbound-mode = true
# encrypted-dns-follow-outbound-mode：加密 DNS 跟随当前出站模式
encrypted-dns-server = https://223.6.6.6/dns-query
# encrypted-dns-server：加密 DNS 地址
geoip-maxmind-url = https://github.com/Hackl0us/GeoIP2-CN/raw/release/Country.mmdb
# geoip-maxmind-url：GeoIP 数据库下载地址
external-controller-access = CHANGE_ME_CONTROLLER_PASSWORD@0.0.0.0:6166
# external-controller-access：外部控制器访问密码和端口
http-api-web-dashboard = false
# http-api-web-dashboard：是否启用 Surge 网页控制台
allow-wifi-access = false
# allow-wifi-access：是否允许同局域网设备访问本机 Surge 代理
wifi-access-http-port = 6152
# wifi-access-http-port：Wi-Fi HTTP 代理端口
wifi-access-socks5-port = 6153
# wifi-access-socks5-port：Wi-Fi SOCKS5 代理端口

[Proxy]
# Proxy：节点配置区
# 必填：普通 Snell v5 节点
Node-1 = snell, YOUR_SERVER_IP_OR_DOMAIN, YOUR_SNELL_PORT, psk=YOUR_SNELL_PSK, version=5, reuse=true, tfo=true

# 可选：Snell v5 + ShadowTLS v3 节点。没有 ShadowTLS 就保持注释。
# Node-1-STLS = snell, YOUR_SERVER_IP_OR_DOMAIN, YOUR_SHADOWTLS_PORT, psk=YOUR_SNELL_PSK, version=5, reuse=true, tfo=true, shadow-tls-password=YOUR_SHADOWTLS_PASSWORD, shadow-tls-sni=www.microsoft.com, shadow-tls-version=3

[Proxy Group]
# Proxy Group：策略组配置区，可以在 Surge 里手动切换某类服务走哪个节点
# no-alert=0：切换策略时允许提示
# hidden=0：在 Surge 界面里显示这个策略组
# include-all-proxies=0：不自动包含全部节点，只使用本行明确写出的策略
# 默认只启用 Node-1。
🔰 节点选择 = select, "♻️ 自动选择", Node-1, "🎯 全球直连", "⛔️ 禁止访问"
# select：手动选择策略
♻️ 自动选择 = url-test, Node-1, url=http://www.gstatic.com/generate_204, interval=300
# url-test：自动测速选择最快节点；interval=300 表示每 300 秒测速一次

# 如果启用了 Node-1-STLS，改用下面两行，并注释掉上面两行。
# 🔰 节点选择 = select, "♻️ 自动选择", Node-1, Node-1-STLS, "🎯 全球直连", "⛔️ 禁止访问"
# ♻️ 自动选择 = url-test, Node-1, Node-1-STLS, url=http://www.gstatic.com/generate_204, interval=300
# ChatGPT：OpenAI / ChatGPT 单独分流
ChatGPT = select, "🔰 节点选择", "♻️ 自动选择", no-alert=0, hidden=0, include-all-proxies=0
# Claude：Anthropic / Claude 单独分流
Claude = select, "🔰 节点选择", "♻️ 自动选择", no-alert=0, hidden=0, include-all-proxies=0
# Gemini：Google Gemini 单独分流
Gemini = select, "🔰 节点选择", "♻️ 自动选择", no-alert=0, hidden=0, include-all-proxies=0
# GitHub：GitHub 和 GitHub Copilot 单独分流
GitHub = select, "🔰 节点选择", "♻️ 自动选择", no-alert=0, hidden=0, include-all-proxies=0
# Microsoft：Microsoft / OneDrive 单独分流
Microsoft = select, "🔰 节点选择", "♻️ 自动选择", DIRECT, no-alert=0, hidden=0, include-all-proxies=0
# Telegram：Telegram 单独分流
Telegram = select, "🔰 节点选择", "♻️ 自动选择", no-alert=0, hidden=0, include-all-proxies=0
# Apple：Apple 服务，默认优先直连
Apple = select, DIRECT, "🔰 节点选择", "♻️ 自动选择", no-alert=0, hidden=0, include-all-proxies=0
# YouTube：YouTube 和 YouTube Music 单独分流
YouTube = select, "🔰 节点选择", "♻️ 自动选择", no-alert=0, hidden=0, include-all-proxies=0
# Netflix：Netflix 单独分流
Netflix = select, "🔰 节点选择", "♻️ 自动选择", no-alert=0, hidden=0, include-all-proxies=0
# Spotify：Spotify 单独分流
Spotify = select, "🔰 节点选择", "♻️ 自动选择", no-alert=0, hidden=0, include-all-proxies=0
# AI：其他 AI 服务兜底分流
AI = select, "🔰 节点选择", "♻️ 自动选择", no-alert=0, hidden=0, include-all-proxies=0
🎯 全球直连 = select, DIRECT
# DIRECT：直连，不走代理
⛔️ 禁止访问 = select, REJECT
# REJECT：拒绝连接

[Rule]
# Rule：规则区，Surge 会从上往下匹配，先匹配到哪条就按哪条执行
# RULE-SET：引用一个远程或本地规则文件
# update-interval=86400：每 86400 秒，也就是每天更新一次规则
RULE-SET,https://raw.githubusercontent.com/bleeeet/surge-rules/main/rules/direct/Unblocking.list,"🎯 全球直连","update-interval=86400"
