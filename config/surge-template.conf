RULE-SET,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Surge/AmazonCN/AmazonCN.list,"🎯 全球直连","update-interval=86400"
RULE-SET,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Surge/Cloudflarecn/Cloudflarecn.list,"🎯 全球直连","update-interval=86400"
RULE-SET,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Surge/Download/Download.list,"🎯 全球直连","update-interval=86400"
RULE-SET,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/GoogleCN.list,"🎯 全球直连","update-interval=86400"
RULE-SET,https://raw.githubusercontent.com/bleeeet/surge-rules/main/rules/media/Spotify.list,Spotify,"update-interval=86400"
RULE-SET,https://raw.githubusercontent.com/bleeeet/surge-rules/main/rules/services/OneDrive.list,Microsoft,"update-interval=86400"
RULE-SET,https://raw.githubusercontent.com/bleeeet/surge-rules/main/rules/services/Microsoft.list,Microsoft,"update-interval=86400"
RULE-SET,https://raw.githubusercontent.com/bleeeet/surge-rules/main/rules/services/Amazon.list,"🔰 节点选择","update-interval=86400"
RULE-SET,https://raw.githubusercontent.com/bleeeet/surge-rules/main/rules/services/AmazonIP.list,"🔰 节点选择","update-interval=86400"
RULE-SET,https://raw.githubusercontent.com/bleeeet/surge-rules/main/rules/services/Jetbrains.list,"🔰 节点选择","update-interval=86400"
