RULE-SET,LAN,DIRECT
# LAN：局域网规则
GEOIP,CN,"🎯 全球直连"
# GEOIP,CN：中国大陆 IP 直连
FINAL,🔰 节点选择,dns-failed
# FINAL：兜底规则；前面都没匹配到的流量走这里
# dns-failed：DNS 解析失败时也走这条兜底策略

[URL Rewrite]
# URL Rewrite：URL 重写规则
^https?://(www.)?g.cn https://www.google.com 302
^https?://(www.)?google.cn https://www.google.com 302
# 302：临时重定向
